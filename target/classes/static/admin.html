<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Employee Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body admin-body">
    <nav class="navbar navbar-admin">
        <div class="nav-brand">Workspace Admin</div>
        <div class="nav-user">
            <span id="headerUserName">Admin Panel</span>
            <button onclick="logout()" class="btn btn-secondary btn-small nav-btn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <header class="dashboard-header">
            <div>
                <h1>Organization Attendance</h1>
                <p class="subtitle">Complete overview of all employee records.</p>
            </div>
        </header>

        <div class="card history-card">
            <div class="filters" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="margin-bottom: 0;">All Records</h3>
                <button class="btn btn-primary btn-small" onclick="exportCsv()">Extract to CSV</button>
            </div>
            <div class="table-responsive">
                <table class="table admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Employee Name</th>
                            <th>Date</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Status</th>
                            <th>Total Hrs</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr><td colspan="7">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(sessionStorage.getItem('user'));
            if (!user) {
                window.location.href = 'index.html';
            } else if (user.role !== 'ADMIN') {
                window.location.href = 'dashboard.html';
            } else {
                initAdminDashboard();
            }
        });
    </script>
</body>
</html>
