<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Employee Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <div class="nav-brand">Workspace</div>
        <div class="nav-user">
            <span id="headerUserName">Loading...</span>
            <button onclick="logout()" class="btn btn-secondary btn-small">Logout</button>
        </div>
    </nav>

    <div class="container">
        <header class="dashboard-header">
            <div>
                <h1 id="welcomeMessage">Good Morning, --</h1>
                <p class="subtitle">Employee ID: <span id="displayEmpId">--</span></p>
            </div>
            <div class="current-time" id="currentTime">00:00:00</div>
        </header>

        <div class="cards-grid">
            <div class="card status-card">
                <h3>Today's Status</h3>
                <div class="status-indicator" id="todayStatusBadge">
                    Checking...
                </div>
                
                <div class="action-buttons">
                    <button id="checkInBtn" class="btn btn-primary" onclick="markAttendance('check-in')">Check In</button>
                    <button id="checkOutBtn" class="btn btn-outline" onclick="markAttendance('check-out')" disabled>Check Out</button>
                </div>
                <div id="actionMessage" class="action-message"></div>
                
                <div class="times-display">
                    <div class="time-block">
                        <span class="time-label">Check In</span>
                        <span class="time-value" id="todayCheckIn">--:--</span>
                    </div>
                    <div class="time-block">
                        <span class="time-label">Check Out</span>
                        <span class="time-value" id="todayCheckOut">--:--</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card history-card" style="margin-top: 2rem;">
            <h3>Attendance History</h3>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Status</th>
                            <th>Total Hrs</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Ensure user is not admin and is logged in
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(sessionStorage.getItem('user'));
            if (!user) {
                window.location.href = 'index.html';
            } else if (user.role === 'ADMIN') {
                window.location.href = 'admin.html';
            } else {
                initDashboard();
            }
        });
    </script>
</body>
</html>
